[providers]
  node = {}
  python = {}

[phases.setup]
  nixPkgs = ["nodejs", "python3", "ffmpeg"]

[phases.install]
  cmds = ["npm ci", "pip3 install --break-system-packages edge-tts || pip install --break-system-packages edge-tts || true"]

[phases.build]
  cmds = ["npm run build"]

[start]
  cmd = "npm start"
